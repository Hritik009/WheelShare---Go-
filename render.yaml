services:
  # Backend API Service
  - type: web
    name: wheelshare-backend
    env: node
    buildCommand: cd wheelshare-server && npm install
    startCommand: cd wheelshare-server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Add your MongoDB Atlas URI in Render dashboard
      - key: MONGO_URI
        sync: false
      # Add your JWT secret in Render dashboard  
      - key: JWT_SECRET
        sync: false
      # Add your admin secret in Render dashboard
      - key: ADMIN_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://wheelshare-frontend.onrender.com

  # Frontend Static Site
  - type: web
    name: wheelshare-frontend
    env: static
    buildCommand: cd wheelshare-client && npm install && npm run build
    staticPublishPath: wheelshare-client/dist
    envVars:
      - key: VITE_API_URL
        value: https://wheelshare-backend.onrender.com/api